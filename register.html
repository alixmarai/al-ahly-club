<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل عضوية - النادي الأهلي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="logo">النادي الأهلي</h1>
            <nav>
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="about.html">تاريخ النادي</a></li>
                    <li><a href="register.html" class="active">تسجيل عضوية</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="content-section container">
        <div class="form-container">
            <h2>تسجيل عضوية جديدة</h2>
            <form action="#" method="post">
                <div class="input-group">
                    <label for="name">الاسم الرباعي</label>
                    <input type="text" id="name" name="name" required placeholder="أدخل اسمك بالكامل">
                </div>
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>
                <div class="input-group">
                    <label for="phone">رقم الهاتف</label>
                    <input type="tel" id="phone" name="phone" required placeholder="01xxxxxxxxx">
                </div>
                <button type="submit" class="btn btn-submit">تأكيد التسجيل</button>
            </form>
        </div>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 النادي الأهلي</p>
    </footer>
</body>
</html>
